<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizler App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      text-align: center;
    }
    #question {
      font-size: 1.5rem;
      margin-bottom: 20px;
    }
    #feedback {
      font-size: 1.2rem;
      margin: 10px 0;
    }
    #score {
      font-size: 1.2rem;
      margin: 10px 0;
    }
    button {
      font-size: 1rem;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }
    #restartBtn {
      display: none;
      background-color: #f39c12;
      color: white;
      border: none;
    }
    #trueBtn {
      background-color: #27ae60;
      color: white;
      border: none;
    }
    #falseBtn {
      background-color: #c0392b;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

  <h1>Quizler App</h1>
  <div id="question">Loading quiz...</div>
  <div id="feedback"></div>
  <div id="score">Score: 0</div>

  <button id="trueBtn">True</button>
  <button id="falseBtn">False</button>
  <button id="restartBtn">Restart Quiz</button>

  <!-- Link to your script.js -->
  <script src="app.js"></script>
</body>
</html>
